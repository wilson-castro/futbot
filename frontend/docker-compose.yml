# 🚀 DEPRECATED - Use ./docker/docker-compose.yml instead
#
# Este arquivo foi consolidado para a pasta ./docker/
# para evitar repetição e facilitar manutenção.
#
# Novo caminho:
#   cd ../docker
#   docker-compose up --build
#
# Ou da raiz:
#   docker-compose up --build

services:
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: futbot-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:8001/v1/ws/chat

