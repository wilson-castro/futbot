version: "3.9"

services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: futbot-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_MAX_QUEUE: "512"
      OLLAMA_CONTEXT_LENGTH: "4096"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - futbot-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: futbot-backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      NODE_ENV: production
      OLLAMA_URL: http://ollama:11434
      MODEL_NAME: qwen2.5:1.5b
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - futbot-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8001', (res) => process.exit(0))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: futbot-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:8001/v1/ws/chat
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - futbot-network

networks:
  futbot-network:
    driver: bridge

volumes:
  ollama_data:
