version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: futbot-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash-lite}
      TEMPERATURE: ${TEMPERATURE:-0.7}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-gemini-2.0-flash-lite}
    networks:
      - futbot-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8081', (res) => process.exit(0))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: futbot-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8081/v1/ws/chat}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - futbot-network

networks:
  futbot-network:
    driver: bridge
