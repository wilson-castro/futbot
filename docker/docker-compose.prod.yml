version: '3.9'

x-common-variables: &common-variables
  NODE_ENV: production
  OLLAMA_URL: http://ollama:11434
  MODEL_NAME: ${MODEL_NAME:-qwen2.5:1.5b}

x-common-restart: &common-restart
  restart: always

x-common-healthcheck: &common-healthcheck
  interval: 60s
  timeout: 10s
  retries: 5
  start_period: 40s

services:
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-latest}
    container_name: ${PROJECT_NAME:-futbot}-ollama-prod
    <<: *common-restart
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-8}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-3}
    networks:
      - futbot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      <<: *common-healthcheck
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: ${REGISTRY:-docker.io}/${PROJECT_NAME:-futbot}-backend:${VERSION:-latest}
    container_name: ${PROJECT_NAME:-futbot}-backend-prod
    <<: *common-restart
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      <<: *common-variables
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - futbot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001"]
      <<: *common-healthcheck
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ${BACKEND_URL:-ws://localhost:${BACKEND_PORT:-8001}}/v1/ws/chat
    image: ${REGISTRY:-docker.io}/${PROJECT_NAME:-futbot}-frontend:${VERSION:-latest}
    container_name: ${PROJECT_NAME:-futbot}-frontend-prod
    <<: *common-restart
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ${BACKEND_URL:-ws://localhost:${BACKEND_PORT:-8001}}/v1/ws/chat
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - futbot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      <<: *common-healthcheck
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  futbot-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  ollama_data:
    driver: local
